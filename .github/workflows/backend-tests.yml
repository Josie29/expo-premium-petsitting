# Run backend pytest on pull requests and pushes to main.
# Pair with branch protection: Settings → Branches → require this check before merge.
name: Backend tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Lets you run the workflow from Actions → Backend tests → "Run workflow"
  # so the check name appears under branch protection after the first run.
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: python -m pytest backend/tests/
